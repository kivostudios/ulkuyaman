<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<title>Ülkü Yaman Collection — Landing</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg-cream:#f6f1e8;
  --paper:#fbf8f2;
  --ink:#1a1410;
  --muted:#8a7d6b;
  --stone-soft:#ece4d4;
  --stone:#d9cdb6;
  --accent:#7a5a3a;
  --font-display:"Cormorant Garamond","Times New Roman",serif;
  --font-sans:"Inter Tight","Helvetica Neue",Helvetica,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg-cream);color:var(--ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;text-rendering:geometricPrecision}
img{max-width:100%;display:block;user-select:none}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
::selection{background:var(--ink);color:var(--bg-cream)}

.uy-root{min-height:100vh}

/* ── shared bits ───────────────────── */
.uy-eyebrow{display:inline-block;font-size:11px;letter-spacing:.22em;font-weight:600;color:var(--muted);text-transform:uppercase}
.uy-display{font-family:var(--font-display);font-weight:400;letter-spacing:-.01em;line-height:1.04;color:var(--ink)}
.uy-display em{font-style:italic;font-weight:400;color:var(--accent)}
.uy-display-sm{font-family:var(--font-display);font-weight:400;font-size:28px;line-height:1.1}
.uy-display-lg{font-family:var(--font-display);font-weight:400;font-size:clamp(56px,9vw,148px);line-height:.92;letter-spacing:-.02em}
.uy-sep{opacity:.4;margin:0 8px}

/* ── navbar ───────────────────────── */
.uy-nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(246,241,232,.78);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);transition:box-shadow .3s,background .3s}
.uy-nav.is-scrolled{background:rgba(251,248,242,.92);box-shadow:0 1px 0 rgba(26,20,16,.06)}
.uy-nav-inner{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;height:74px;padding:0 32px;gap:24px}
.uy-nav-left{display:flex;gap:26px;align-items:center}
.uy-nav-left a{font-size:11px;letter-spacing:.18em;font-weight:600;color:var(--ink);transition:opacity .2s}
.uy-nav-left a:hover{opacity:.55}
.uy-brand{font-family:var(--font-display);font-size:28px;letter-spacing:.18em;font-weight:500;text-align:center;white-space:nowrap}
.uy-nav-right{display:flex;align-items:center;justify-content:flex-end;gap:16px}
.uy-locale{display:flex;align-items:center;gap:4px;font-size:11px;letter-spacing:.15em;font-weight:600;color:rgba(26,20,16,.35)}
.uy-locale .on{color:var(--ink)}
.uy-icon{padding:6px;display:inline-flex;color:var(--ink);transition:opacity .2s;position:relative}
.uy-icon:hover{opacity:.6}
.uy-cart-count{position:absolute;top:0;right:0;background:var(--accent);color:#fff;font-size:9px;font-weight:600;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* ── hero ─────────────────────────── */
.uy-hero{position:relative;min-height:100vh;padding:74px 32px 40px;display:grid;grid-template-rows:1fr auto auto;gap:40px}
.uy-hero-img{position:absolute;inset:74px 32px 100px;overflow:hidden;border-radius:0;background:var(--ink)}
.uy-hero-img img{width:100%;height:100%;object-fit:cover;animation:slow-zoom 18s ease-out forwards}
.uy-hero-img::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(26,20,16,.18) 0%,rgba(26,20,16,0) 30%,rgba(26,20,16,0) 60%,rgba(26,20,16,.55) 100%)}
@keyframes slow-zoom{from{transform:scale(1.06)}to{transform:scale(1)}}
.uy-hero-eyebrow{position:relative;z-index:2;display:flex;align-items:center;gap:10px;color:#fff;font-size:11px;letter-spacing:.22em;font-weight:600;margin-top:24px;animation:fade-up 1.2s .3s both}
.uy-dot{width:6px;height:6px;border-radius:50%;background:var(--stone)}
.uy-hero-headline{position:relative;z-index:2;align-self:end;margin-bottom:8vh}
.uy-hero-headline h1{font-family:var(--font-display);color:#fff;font-size:clamp(54px,9vw,148px);line-height:.92;font-weight:400;letter-spacing:-.02em;text-shadow:0 1px 40px rgba(0,0,0,.2)}
.uy-hero-headline .line{display:block;animation:fade-up 1.2s both}
.uy-hero-headline .line:nth-child(1){animation-delay:.5s}
.uy-hero-headline .line:nth-child(2){animation-delay:.75s;font-style:italic;color:var(--stone)}
.uy-hero-foot{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;color:#fff;animation:fade-up 1.2s 1s both}
.uy-hero-meta{font-size:11px;letter-spacing:.22em;font-weight:600;display:flex;align-items:center}
.uy-cta{display:inline-flex;align-items:center;gap:10px;font-size:11px;letter-spacing:.22em;font-weight:600;border-bottom:1px solid currentColor;padding-bottom:6px;transition:gap .3s,opacity .2s}
.uy-cta:hover{gap:16px;opacity:.85}
.uy-cta-dark{color:var(--ink)}
@keyframes fade-up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* ── marquee ──────────────────────── */
.uy-marquee{overflow:hidden;border-block:1px solid rgba(26,20,16,.1);background:var(--paper);padding:18px 0}
.uy-marquee-track{display:flex;gap:42px;animation:marquee 38s linear infinite;white-space:nowrap;width:max-content}
.uy-mword{font-family:var(--font-display);font-style:italic;font-size:30px;letter-spacing:.01em;color:var(--ink)}
.uy-mark{font-size:14px;color:var(--accent);align-self:center}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-33.333%)}}

/* ── about ────────────────────────── */
.uy-about{padding:140px 32px 120px;display:grid;grid-template-columns:1fr 1.05fr;gap:80px;align-items:start}
.uy-about-text{position:sticky;top:120px}
.uy-about-text h2{font-size:clamp(36px,4.6vw,68px);margin-top:18px;max-width:640px}
.uy-about-text p{font-size:15px;line-height:1.85;color:rgba(26,20,16,.78);margin-top:28px;max-width:520px}
.uy-about-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.uy-about-img{position:relative;overflow:hidden;background:var(--stone-soft)}
.uy-about-img.is-tall{aspect-ratio:3/4.4;margin-top:60px}
.uy-about-img.is-short{aspect-ratio:3/3.6}
.uy-about-img img{width:100%;height:100%;object-fit:cover;transition:transform 1.4s ease-out}
.uy-about-img:hover img{transform:scale(1.04)}
.uy-about-tag{position:absolute;left:16px;bottom:16px;color:#fff;font-size:10px;letter-spacing:.22em;font-weight:600;display:flex;flex-direction:column;gap:4px;mix-blend-mode:difference}

/* ── product grid (draggable) ─────── */
.uy-shop{padding:120px 0 120px}
.uy-shop-head{display:flex;justify-content:space-between;align-items:flex-end;padding:0 32px;margin-bottom:40px}
.uy-tabs{display:flex;gap:32px}
.uy-tabs button{font-size:12px;letter-spacing:.22em;font-weight:600;color:rgba(26,20,16,.4);padding-bottom:6px;border-bottom:1px solid transparent;text-transform:uppercase;transition:color .3s,border-color .3s}
.uy-tabs button.is-active{color:var(--ink);border-bottom-color:var(--ink)}
.uy-tabs button:hover{color:var(--ink)}
.uy-shop-nudge{display:flex;align-items:center;gap:12px}
.uy-hint{font-size:10px;letter-spacing:.25em;font-weight:600;color:var(--muted);margin-right:8px}
.uy-shop-nudge button{width:38px;height:38px;border:1px solid rgba(26,20,16,.18);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:var(--ink);transition:background .25s,color .25s,border-color .25s}
.uy-shop-nudge button:hover{background:var(--ink);color:var(--bg-cream);border-color:var(--ink)}
.uy-shop-track{display:flex;gap:18px;overflow-x:auto;scroll-snap-type:x mandatory;padding:0 32px 24px;cursor:grab;scrollbar-width:none}
.uy-shop-track::-webkit-scrollbar{display:none}
.uy-shop-track.is-grabbing{cursor:grabbing}
.uy-card{flex:0 0 calc(25% - 14px);min-width:240px;scroll-snap-align:start;transition:transform .4s ease}
.uy-card:hover{transform:translateY(-4px)}
.uy-card-img{position:relative;aspect-ratio:4/5;background:var(--stone-soft);overflow:hidden}
.uy-card-img img{width:100%;height:100%;object-fit:cover;transition:transform 1s ease-out;pointer-events:none}
.uy-card:hover .uy-card-img img{transform:scale(1.05)}
.uy-card-num{position:absolute;top:12px;left:14px;font-family:var(--font-display);font-style:italic;font-size:14px;color:rgba(26,20,16,.55)}
.uy-card-meta{display:flex;justify-content:space-between;padding:14px 2px 0;font-size:12px;letter-spacing:.05em}
.uy-card-name{font-weight:600;letter-spacing:.12em}
.uy-card-price{color:var(--muted)}

/* ── atelier sticky ──────────────── */
.uy-atelier{display:grid;grid-template-columns:1fr 1fr;background:var(--ink);color:var(--bg-cream);position:relative}
.uy-atelier .uy-eyebrow{color:rgba(246,241,232,.55)}
.uy-atelier-rail{position:relative}
.uy-atelier-sticky{position:sticky;top:0;height:100vh;display:flex;align-items:center;justify-content:center;padding:60px}
.uy-atelier-img-wrap{position:relative;width:100%;height:100%;max-height:80vh;overflow:hidden;background:#0e0a06}
.uy-atelier-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s ease-out,transform 8s ease-out}
.uy-atelier-img.is-active{opacity:1;transform:scale(1.04)}
.uy-atelier-badge{position:absolute;left:24px;bottom:24px;color:#fff;display:flex;flex-direction:column;gap:4px}
.uy-atelier-badge .uy-eyebrow{color:rgba(255,255,255,.6)}
.uy-tag-line{font-size:10px;letter-spacing:.22em;color:rgba(255,255,255,.55);margin-top:4px}
.uy-atelier-steps{padding:140px 60px 140px 0;display:flex;flex-direction:column;gap:90px}
.uy-atelier-steps .uy-display{font-size:clamp(36px,4.4vw,68px);max-width:540px;color:var(--bg-cream);margin-top:18px}
.uy-atelier-steps .uy-display em{color:var(--stone)}
.uy-atelier-step{padding:28px 0;border-top:1px solid rgba(255,255,255,.1);opacity:.32;transition:opacity .6s}
.uy-atelier-step.is-active{opacity:1}
.uy-step-num{font-family:var(--font-display);font-style:italic;font-size:18px;color:var(--stone);display:block;margin-bottom:10px}
.uy-atelier-step h3{font-family:var(--font-display);font-size:36px;font-weight:400;margin-bottom:14px;letter-spacing:-.005em}
.uy-atelier-step p{font-size:15px;line-height:1.8;color:rgba(246,241,232,.72);max-width:480px}

/* ── categories ──────────────────── */
.uy-cats{padding:140px 32px 80px}
.uy-cats-head{margin-bottom:60px}
.uy-cats-head h2{font-size:clamp(36px,4.6vw,68px);margin-top:18px}
.uy-cats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.uy-cat{display:block;cursor:pointer}
.uy-cat-img{aspect-ratio:4/5;overflow:hidden;background:var(--stone-soft);position:relative}
.uy-cat-img::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 60%,rgba(26,20,16,.35));opacity:0;transition:opacity .5s}
.uy-cat:hover .uy-cat-img::after{opacity:1}
.uy-cat-img img{width:100%;height:100%;object-fit:cover;transition:transform 1.4s ease-out}
.uy-cat:hover .uy-cat-img img{transform:scale(1.045)}
.uy-cat-meta{display:flex;justify-content:space-between;align-items:flex-end;padding:18px 4px 0}
.uy-cat-sub{font-family:var(--font-display);font-style:italic;font-size:14px;color:var(--muted);display:block;margin-bottom:4px}
.uy-cat-name{font-size:14px;letter-spacing:.18em;font-weight:600}
.uy-cat-cta{font-size:11px;letter-spacing:.2em;font-weight:600;color:var(--muted);transition:color .3s}
.uy-cat:hover .uy-cat-cta{color:var(--ink)}

/* ── testimonials ────────────────── */
.uy-testimonials{padding:140px 32px;text-align:center;background:var(--paper);position:relative;overflow:hidden}
.uy-testimonials::before,.uy-testimonials::after{content:"";position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--stone-soft) 0%,transparent 70%);opacity:.6}
.uy-testimonials::before{left:-80px;top:10%}
.uy-testimonials::after{right:-80px;bottom:10%}
.uy-quote-stage{position:relative;max-width:920px;margin:32px auto 40px;min-height:240px}
.uy-quote{position:absolute;inset:0;opacity:0;transition:opacity .8s ease-out;display:flex;flex-direction:column;justify-content:center}
.uy-quote.is-active{opacity:1;position:relative}
.uy-quote .uy-display{font-size:clamp(28px,3.2vw,46px);line-height:1.25}
.uy-mark-q{font-family:var(--font-display);font-style:italic;color:var(--accent);font-size:1.2em;margin:0 .15em}
.uy-quote footer{margin-top:28px;font-size:11px;letter-spacing:.22em;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center}
.uy-quote-dots{display:inline-flex;gap:10px}
.uy-quote-dots button{width:8px;height:8px;border-radius:50%;background:rgba(26,20,16,.2);transition:background .3s,transform .3s}
.uy-quote-dots button.is-active{background:var(--accent);transform:scale(1.4)}

/* ── journal + newsletter ──────── */
.uy-foot-feature{padding:140px 32px;display:grid;grid-template-columns:1fr 1fr;gap:80px;border-top:1px solid rgba(26,20,16,.08)}
.uy-feat h3{font-size:clamp(28px,3.2vw,42px);margin:18px 0 24px;max-width:420px}
.uy-feat p{font-size:14px;line-height:1.85;color:rgba(26,20,16,.75);max-width:420px;margin-bottom:32px}
.uy-feat .uy-cta{color:var(--ink)}
.uy-news-form{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--ink);padding-bottom:8px;max-width:480px;margin-bottom:14px}
.uy-news-form input{flex:1;background:transparent;border:0;outline:none;font:inherit;font-size:14px;padding:8px 0;color:var(--ink)}
.uy-news-form input::placeholder{color:var(--muted)}
.uy-news-form button{font-size:11px;letter-spacing:.22em;font-weight:600;padding:8px 4px;transition:opacity .2s}
.uy-news-form button:hover:not(:disabled){opacity:.6}
.uy-news-form button:disabled,.uy-news-form input:disabled{opacity:.5;cursor:default}
.uy-fineprint{font-size:11px;color:var(--muted);letter-spacing:.04em}

/* ── footer ──────────────────────── */
.uy-footer{background:var(--ink);color:var(--bg-cream);padding:100px 32px 32px}
.uy-footer-top{display:grid;grid-template-columns:1.4fr 2fr;gap:80px;padding-bottom:60px;border-bottom:1px solid rgba(246,241,232,.12)}
.uy-footer-brand .uy-display-lg{display:block;margin-bottom:20px}
.uy-footer-brand p{font-size:14px;line-height:1.8;color:rgba(246,241,232,.65);max-width:380px}
.uy-social{display:flex;gap:14px;margin-top:24px;font-size:11px;letter-spacing:.22em;font-weight:600}
.uy-social a:hover{color:var(--stone)}
.uy-footer-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
.uy-footer-cols h4{font-size:11px;letter-spacing:.22em;font-weight:600;text-transform:uppercase;color:rgba(246,241,232,.85);margin-bottom:18px}
.uy-footer-cols a,.uy-footer-cols span{display:block;font-size:13px;color:rgba(246,241,232,.6);margin-bottom:10px;line-height:1.6;transition:color .2s}
.uy-footer-cols a:hover{color:var(--bg-cream)}
.uy-footer-bot{display:flex;justify-content:space-between;align-items:center;padding-top:24px;font-size:11px;color:rgba(246,241,232,.5);letter-spacing:.04em;flex-wrap:wrap;gap:14px}
.uy-footer-bot a{margin-left:18px;transition:color .2s}
.uy-footer-bot a:hover{color:var(--bg-cream)}

/* ── responsive ──────────────────── */
@media (max-width:980px){
  .uy-nav-inner{grid-template-columns:auto 1fr auto;padding:0 16px;height:64px}
  .uy-nav-left{display:none}
  .uy-brand{font-size:20px}
  .uy-hero{padding:64px 16px 30px;min-height:90vh}
  .uy-hero-img{inset:64px 16px 80px}
  .uy-about{grid-template-columns:1fr;padding:80px 16px;gap:50px}
  .uy-about-text{position:static}
  .uy-shop-head{padding:0 16px;flex-wrap:wrap;gap:20px}
  .uy-shop-track{padding:0 16px 24px}
  .uy-card{flex-basis:75%;min-width:240px}
  .uy-atelier{grid-template-columns:1fr}
  .uy-atelier-sticky{position:relative;height:60vh;padding:24px 16px}
  .uy-atelier-steps{padding:60px 16px;gap:50px}
  .uy-cats,.uy-testimonials,.uy-foot-feature,.uy-footer{padding-left:16px;padding-right:16px}
  .uy-cats{padding-top:80px}
  .uy-cats-grid{grid-template-columns:1fr;gap:18px}
  .uy-foot-feature{grid-template-columns:1fr;gap:60px;padding-top:80px;padding-bottom:80px}
  .uy-footer-top{grid-template-columns:1fr;gap:50px}
  .uy-footer-cols{grid-template-columns:1fr 1fr;gap:24px}
  .uy-marquee{padding:14px 0}
  .uy-mword{font-size:22px}
}
</style>
</head>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  return [ref, visible];

// ─────────────────────────────────────────────────────────────
// PRODUCT GRID — sürüklenebilir / draggable
// ─────────────────────────────────────────────────────────────
function ProductGrid() {
  const [tab, setTab] = useState("best");
  const trackRef = useRef(null);
  const items = tab === "best" ? PRODUCTS : [...PRODUCTS].reverse();

  // drag-to-scroll
  useEffect(() => {
    const el = trackRef.current;
    if (!el) return;
    let isDown = false, startX = 0, startScroll = 0;
    const down = (e) => {
      isDown = true; el.classList.add("is-grabbing");
      startX = (e.touches?.[0]?.pageX ?? e.pageX) - el.offsetLeft;
      startScroll = el.scrollLeft;
    };
    const up = () => { isDown = false; el.classList.remove("is-grabbing"); };
    const move = (e) => {
      if (!isDown) return;
      e.preventDefault();
      const x = (e.touches?.[0]?.pageX ?? e.pageX) - el.offsetLeft;
      el.scrollLeft = startScroll - (x - startX) * 1.2;
    };
    el.addEventListener("mousedown", down);
    window.addEventListener("mouseup", up);
    el.addEventListener("mouseleave", up);
    el.addEventListener("mousemove", move);
    return () => {
      el.removeEventListener("mousedown", down);
      window.removeEventListener("mouseup", up);
      el.removeEventListener("mouseleave", up);
      el.removeEventListener("mousemove", move);
    };
  }, []);

  const nudge = (dir) => {
    const el = trackRef.current;
    if (!el) return;
    el.scrollBy({ left: dir * el.clientWidth * 0.7, behavior: "smooth" });
  };

  return (
    <section className="uy-shop" id="yeni" data-screen-label="02 Shop">
      <Reveal className="uy-shop-head">
        <div className="uy-tabs">
          <button className={tab === "best" ? "is-active" : ""} onClick={() => setTab("best")}>ÇOK SATANLAR</button>
          <button className={tab === "new" ? "is-active" : ""} onClick={() => setTab("new")}>YENİ GELENLER</button>
        </div>
        <div className="uy-shop-nudge">
          <span className="uy-hint">SÜRÜKLE</span>
          <button onClick={() => nudge(-1)} aria-label="Önceki">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
          </button>
          <button onClick={() => nudge(1)} aria-label="Sonraki">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </button>
        </div>
      </Reveal>

      <div className="uy-shop-track" ref={trackRef}>
        {items.map((p, i) => (
          <a key={p.id} href="#" className="uy-card" style={{ "--i": i }}>
            <div className="uy-card-img">
              <img src={p.img} alt={p.name} draggable="false"/>
              <span className="uy-card-num">{String(i + 1).padStart(2, "0")}</span>
            </div>
            <div className="uy-card-meta">
              <span className="uy-card-name">{p.name}</span>
              <span className="uy-card-price">₺{p.price.toLocaleString("tr-TR")}</span>
            </div>
          </a>
        ))}
      </div>
    </section>
  );
}

// STICKY ATELIER — sticky-scroll editorial
// ─────────────────────────────────────────────────────────────
function Atelier() {
  const stepsRef = useRef(null);
  const [active, setActive] = useState(0);
  const steps = [
    { n: "01", t: "DERİ SEÇİMİ", b: "Sertifikalı tabakhanelerden gelen sebze tabaklı dana derisi. Her parça elle inceleniyor; doku, esneklik, renk uyumu için." , img: IMG.craft1 },
    { n: "02", t: "KESİM & ŞABLON", b: "Heykelsi siluet, milimetrik şablonlarla başlıyor. Bir usta her gün yalnızca on çift kesebilir.", img: IMG.craft2 },
    { n: "03", t: "EL DİKİŞİ", b: "Saten dikiş ve elle çakılan tabanlar — ayağa zamanla şekil veren, yumuşayan bir his. Manisa'da, üç ustanın imzasıyla.", img: IMG.craft3 },
  ];

  useEffect(() => {
    const onScroll = () => {
      const el = stepsRef.current;
      if (!el) return;
      const children = [...el.querySelectorAll("[data-step]")];
      const mid = window.innerHeight * 0.5;
      let idx = 0;
      children.forEach((c, i) => {
        const r = c.getBoundingClientRect();
        if (r.top <= mid) idx = i;
      });
      setActive(idx);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <section className="uy-atelier">
      <div className="uy-atelier-rail">
        <div className="uy-atelier-sticky">
          <div className="uy-atelier-img-wrap">
            {steps.map((s, i) => (
              <img
                key={s.n}
                src={s.img}
                alt={s.t}
                className={`uy-atelier-img ${i === active ? "is-active" : ""}`}
              />
            ))}
            <div className="uy-atelier-badge">
              <span className="uy-eyebrow">ATÖLYE</span>
              <span className="uy-display-sm">Manisa, Türkiye</span>
              <span className="uy-tag-line">41° kuzey · 27° doğu</span>
            </div>
          </div>
        </div>
      </div>

      <div className="uy-atelier-steps" ref={stepsRef}>
        <Reveal>
          <span className="uy-eyebrow">— YAPIM SÜRECİ</span>
          <h2 className="uy-display">Üç usta, üç adım, bir çift.</h2>
        </Reveal>
        {steps.map((s, i) => (
          <div key={s.n} className={`uy-atelier-step ${i === active ? "is-active" : ""}`} data-step>
            <span className="uy-step-num">{s.n}</span>
            <h3>{s.t}</h3>
            <p>{s.b}</p>
          </div>
        ))}
        <Reveal delay={0.05}>
          <a href="#" className="uy-cta uy-cta-dark">
            ATÖLYEYİ KEŞFET
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.4"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </a>
        </Reveal>
      </div>
    </section>
  );
}
